<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danial Jeelani - Personal Page</title>
    <style>
        body {
            font-family: Comfortaa, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #000000;
        }
        .container {
            background-color: #000000;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 1;
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            color: #2bc2bd;
        }
        .bio {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
            color: #ffffff; /* white color */
        }
        .links {
            text-align: center;
        }
        .link-btn {
            display: inline-block;
            background-color: #33b57a;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .link-btn:hover {
            background-color: #216e4b;
        }
        .interests {
            margin-top: 30px;
        }
        .interests h2 {
            color: aqua;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .interests ul {
            list-style-type: none;
            padding: 0;
            color: #ffffff; /* white color */
        }
        .interests li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
            color: #ffffff; /* white color */
        }
        .interests li::before {
            content: "•";
            color: aqua;
            font-size: 20px;
            position: absolute;
            left: 0;
            top: -3px;
        }
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000000;
            top: 0;
            left: 0;
            z-index: 0;
        }
    </style>
    <!-- Include particles.js library -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            particlesJS('particles-js', {
                particles: {
                    number: { value: 80, density: { enable: true, value_area: 800 } },
                    color: { value: '#ffffff' },
                    shape: { type: 'circle', stroke: { width: 0, color: '#000000' }, polygon: { nb_sides: 5 }, image: { src: 'img/github.svg', width: 100, height: 100 } },
                    opacity: { value: 0.5, random: false, anim: { enable: false, speed: 1, opacity_min: 0.1, sync: false } },
                    size: { value: 3, random: true, anim: { enable: false, speed: 40, size_min: 0.1, sync: false } },
                    line_linked: { enable: true, distance: 150, color: '#ffffff', opacity: 0.4, width: 1 },
                    move: { enable: true, speed: 6, direction: 'none', random: false, straight: false, out_mode: 'out', bounce: false, attract: { enable: false, rotateX: 600, rotateY: 1200 } }
                },
                interactivity: {
                    detect_on: 'canvas',
                    events: { onhover: { enable: true, mode: 'repulse' }, onclick: { enable: true, mode: 'push' }, resize: true },
                    modes: { grab: { distance: 400, line_linked: { opacity: 1 } }, bubble: { distance: 400, size: 40, duration: 2, opacity: 8, speed: 3 }, repulse: { distance: 200, duration: 0.4 }, push: { particles_nb: 4 }, remove: { particles_nb: 2 } }
                },
                retina_detect: true
            });
        });
    </script>
</head>
<body>
    <!-- Particle animation container -->
    <div id="particles-js"></div>

    <!-- Content container -->
    <div class="container">
        <header>
            <img src="https://avatars.githubusercontent.com/u/158510199?v=4" alt="Danial Jeelani" class="logo">
            <h1>Danial Jeelani</h1>
        </header>
        <div class="bio">
            <p>Hi, I'm Danial Jeelani, a senior high school student and passionate enthusiast of STEM Olympiads.</p>
        </div>
        <div class="links">
            <a href="https://github.com/diplomaticfellow" class="link-btn" target="_blank">Visit My GitHub</a>
        </div>
        <div class="interests">
            <h2>My Interests</h2>
            <ul>
                <li>Mathematics</li>
                <li>Physics</li>
                <li>Computer Science</li>
                <li>Robotics</li>
                <li>Scientific Research</li>
            </ul>
        </div>
    </div>
</body>
</html>
