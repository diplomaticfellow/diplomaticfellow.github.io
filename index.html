<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danial Jeelani - Personal Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
        }
        h1 {
            color: #2c3e50;
        }
        .bio {
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }
        .links {
            text-align: center;
        }
        .link-btn {
            display: inline-block;
            background-color: #3498db;
            color: #fff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        .link-btn:hover {
            background-color: #2980b9;
        }
        .interests {
            margin-top: 30px;
        }
        .interests h2 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .interests ul {
            list-style-type: none;
            padding: 0;
        }
        .interests li {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        .interests li::before {
            content: "•";
            color: #3498db;
            font-size: 20px;
            position: absolute;
            left: 0;
            top: -3px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://avatars.githubusercontent.com/u/158510199?v=4" alt="Danial Jeelani" class="logo">
            <h1>Danial Jeelani</h1>
        </header>
        <div class="bio">
            <p>Hi, I'm Danial Jeelani, a senior high school student and passionate enthusiast of STEM Olympiads.</p>
        </div>
        <div class="links">
            <a href="https://github.com/diplomaticfellow" class="link-btn" target="_blank">Visit My GitHub</a>
        </div>
        <div class="interests">
            <h2>My Interests</h2>
            <ul>
                <li>Mathematics</li>
                <li>Physics</li>
                <li>Computer Science</li>
                <li>Robotics</li>
                <li>Scientific Research</li>
            </ul>
        </div>
    </div>
</body>
</html>
